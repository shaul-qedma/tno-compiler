[build-system]
requires = ["setuptools>=68.0"]
build-backend = "setuptools.build_meta"

[project]
name = "tno-compiler"
version = "0.1.0"
requires-python = ">=3.10"
dependencies = [
    "jax[cpu]>=0.4.20",
    "scipy>=1.11",
]

[project.optional-dependencies]
test = [
    "pytest>=7.0",
    "hypothesis>=6.0",
    "qiskit>=1.0",
]

[tool.setuptools.packages.find]
where = ["src"]

[tool.pytest.ini_options]
testpaths = ["tests"]
